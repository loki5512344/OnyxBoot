name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-riscv64 genimage
          wget -q https://github.com/riscv-collab/riscv-gnu-toolchain/releases/download/2024.04.01/riscv32-elf-ubuntu-22.04-gcc-nightly-2024.04.01-nightly.tar.gz
          tar xf riscv32-elf-*.tar.gz
          echo "$PWD/riscv32-elf/bin" >> $GITHUB_PATH
          # Use riscv32-elf- prefix; rename for compatibility
          for f in riscv32-elf-*; do
            ln -sf "$f" "${f/riscv32/riscv64}" 2>/dev/null || true
          done

      - name: Build bootloader
        run: make CROSS=riscv64-elf clean all

      - name: Build test kernel
        run: |
          riscv64-elf-g++ -march=rv64gc -mabi=lp64d -mcmodel=medany -ffreestanding \
              -nostdlib -O2 -Wall -Wextra test/kernel.c -T test/kernel.ld \
              -nostdlib -o test/kernel.elf
          riscv64-elf-objcopy -O binary test/kernel.elf test/kernel.bin

      - name: Create disk image
        run: |
          dd if=/dev/zero of=test/test.img bs=1M count=4 2>/dev/null
          dd if=test/kernel.elf of=test/test.img bs=512 conv=notrunc 2>/dev/null

      - name: Run QEMU test
        run: |
          EXPECTED="Hello from test kernel!"
          ERROR_PAT="error"
          OUTPUT=$(timeout 30 qemu-system-riscv64 -M virt -m 256M \
              -bios bootloader.bin \
              -drive file=test/test.img,format=raw,if=none,id=drive0 \
              -device virtio-blk-device,drive=drive0 \
              -nographic -serial mon:stdio 2>&1 | tr -d '\0')
          echo "$OUTPUT"
          echo "$OUTPUT" | grep -qF "$EXPECTED" || { echo "FAIL: missing '$EXPECTED'"; exit 1; }
          if echo "$OUTPUT" | grep -qiE "(error|fail)"; then
            echo "FAIL: output contains error"
            exit 1
          fi
