name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            qemu-system-riscv64 \
            gcc-riscv64-unknown-elf \
            dosfstools mtools

      - name: Build bootloader
        run: make CROSS=riscv64-unknown-elf clean all

      - name: Build test kernel
        run: |
          riscv64-unknown-elf-gcc -march=rv64gc -mabi=lp64d -mcmodel=medany \
              -ffreestanding -nostdlib -O2 -Wall -Wextra test/kernel.c \
              -T test/kernel.ld -nostdlib -o test/kernel.elf

      - name: Create FAT32 disk image
        run: |
          dd if=/dev/zero of=test/test.img bs=1M count=64 2>/dev/null
          parted -s test/test.img mklabel msdos
          parted -s test/test.img mkpart primary fat32 1M 100%
          part_start=2048
          mkfs.fat -F 32 test/test.img --offset=$part_start
          mcopy -i test/test.img@@$((part_start * 512)) test/kernel.elf ::kernel.elf

      - name: Run QEMU test (FAT32)
        run: |
          EXPECTED="Hello from test kernel!"
          OUTPUT=$(timeout 30 qemu-system-riscv64 -M virt -m 256M \
              -bios bootloader.bin \
              -drive file=test/test.img,format=raw,if=none,id=drive0 \
              -device virtio-blk-device,drive=drive0 \
              -nographic -serial mon:stdio 2>&1 | tr -d '\0')
          echo "$OUTPUT"
          echo "$OUTPUT" | grep -qF "$EXPECTED" || { echo "FAIL: missing '$EXPECTED'"; exit 1; }
          if echo "$OUTPUT" | grep -qiE "(error|fail)"; then
            echo "FAIL: output contains error"
            exit 1
          fi
